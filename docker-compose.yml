version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: dockerfile
    container_name: nfe_backend
    ports:
      - "8000:8000"
    volumes:
      - ./notas:/app/notas
      - ./notas:/app/xmls
    restart: unless-stopped
    command: ["uvicorn", "app:app", "--host", "0.0.0.0", "--port", "8000"]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nfe_frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
    restart: unless-stopped
